<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Libas-e-Khas</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Helvetica, Arial, sans-serif;
}

/* Navbar */
nav {
  display: flex;
  justify-content: space-between;
  padding: 20px 50px;
  position: absolute;
  width: 100%;
  color: white;
  z-index: 10;
}

nav h1 {
  font-weight: 500;
  letter-spacing: 2px;
}

nav ul {
  display: flex;
  list-style: none;
  gap: 25px;
  font-size: 14px;
}

/* Hero Section */
.hero {
  height: 100vh;
  background: url('https://images.unsplash.com/photo-1490481651871-ab68de25d43d') center/cover no-repeat;
  display: flex;
  align-items: flex-end;
  padding: 60px;
  color: white;
}

.hero h2 {
  font-size: 50px;
  font-weight: 300;
}

/* Section */
.section {
  padding: 60px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 20px;
}

.grid img {
  width: 100%;
  height: 500px;
  object-fit: cover;
}

/* Product Section */
.products {
  padding: 60px;
}

.product-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
  gap: 30px;
}

.card img {
  width: 100%;
}

.card h3 {
  font-size: 16px;
  margin: 10px 0;
}

.card p {
  color: gray;
}

/* Footer */
footer {
  padding: 40px;
  font-size: 12px;
  text-align: center;
  border-top: 1px solid #ddd;
}
</style>

</head>

<!-- Navbar -->
<nav>

  </ul>
</nav>

<section class="hero">

</section>

    <img src="https://images.unsplash.com/photo-1583002625243-5d9b58c7b51f">
  </div>
</section>

<!-- Products -->

  <div class="product-grid">

    </div><div class="card">
  <img src="https://images.unsplash.com/photo-1602810317324-86c5db46c0c6">

</div>

</div>

      <h3>Luxury Lawn Suit</h3>
      <p>PKR 3,499</p>

    <div class="card">

<!-- Footer -->
<footer>

</body>
</html>
